name: Generate and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'include/**'
  workflow_dispatch:     # Allows manual triggering

permissions:
  contents: write

jobs:
  generate-docs:
    if: github.repository == 'qualcomm/eld'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llvm-project
        uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          path: llvm-project
          ref: main

      - name: Checkout eld
        uses: actions/checkout@v6
        with:
          path: llvm-project/llvm/tools/eld
          ref: main

      - name: Configure workflow environment variables
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/ConfigureBuildWorkflowENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.4'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz doxygen libxml2 libxml2-dev libxslt1-dev
          pip install -r llvm-project/llvm/tools/eld/docs/userguide/requirements.txt

      - name: Install D2 diagram generator
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s -- --prefix "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure D2 PDF renderer
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_BIN" ]; then
            cd /tmp
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
            CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable)"
          fi
          echo "D2_PDF_CHROME_BIN=$CHROME_BIN" >> "$GITHUB_ENV"
          d2 --version
          "$CHROME_BIN" --version

      - name: Run CMake
        run: |
          mkdir obj
          cd obj
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER:STRING=`which clang` \
            -DCMAKE_CXX_COMPILER:STRING=`which clang++` \
            -DLLVM_TARGETS_TO_BUILD:STRING="ARM;AArch64;RISCV;Hexagon" \
            -DLLVM_ENABLE_SPHINX=On \
            -DELD_ENABLE_PDF_DOCS:BOOL=ON \
            ../llvm-project/llvm

      - name: Generate HTML documentation with D2 diagrams
        run: |
          cd obj
          ninja docs-eld-userguide-html

      - name: Generate PDF documentation with D2 diagrams
        run: |
          cd obj
          ninja docs-eld-userguide-pdf
          cp tools/eld/docs/userguide/pdf/ELD_UserGuide.pdf \
            tools/eld/docs/userguide/html/ELD_UserGuide.pdf

      - name: Deploy to docs branch
        run: |
          ROOT=$(pwd)
          cd llvm-project/llvm/tools/eld
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git checkout --orphan docs
          git rm -rf .
          cp -r ${ROOT}/obj/tools/eld/docs/userguide/html/. .
          touch .nojekyll
          git add .
          git commit -m "Update documentation"
          git push -f origin HEAD:refs/heads/documentation
