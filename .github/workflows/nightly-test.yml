name: Nightly check

on:
  # pull_request: {} # Uncomment to build ELD PR branch.
  schedule:
    - cron: '0 7 * * *'  # Runs daily at 1:00 AM CST
  workflow_dispatch: {}


permissions:
  contents: write
jobs:
  build-and-runtest-nightly:
    if: github.repository == 'qualcomm/eld'
    runs-on: ubuntu-22.04
    env:
      BASE_BRANCH_NAME: ${{ github.event.pull_request.base.ref }}
      ELD_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      ELD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
      SCRIPTS_DIR: ${{ github.workspace }}/llvm-project/llvm/tools/eld/.github/workflows/scripts

    steps:
      - name: Set up Clang 22
        uses: egor-tensin/setup-clang@v2
        with:
          version: "22"
          platform: x64

      - name: Install libc++ and libc++abi
        run: |
          sudo apt update
          sudo apt install -y clang-22 lld-22 ninja-build libc++-22-dev libc++abi-22-dev ccache libclang-rt-22-dev libunwind-22-dev
          echo "PATH=/usr/lib/llvm-22/bin:$PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-22/lib:$PATH" >> $GITHUB_ENV

      - name: Build and Test with Clang and show versions
        run: |
          echo "clang version"
          clang --version
          echo "clang++ version"
          clang++ -stdlib=libc++ --version
          echo "ld.lld version"
          ld.lld --version
          echo '#include <iostream>' > test.cpp
          echo 'int main() { std::cout << "Hello, Clang on Ubuntu 24.04!" << std::endl; return 0; }' >> test.cpp
          clang++ -std=c++17 -stdlib=libc++ test.cpp -o test_clang
          ./test_clang

      - name: CPU and Memory information
        run: |
          echo "Number of CPUs:"
          nproc --all # or grep -c ^processor /proc/cpuinfo
          echo "Memory information:"
          free -h # or cat /proc/meminfo

      - name: Checkout llvm-project
        uses: actions/checkout@v7
        with:
          repository: llvm/llvm-project
          path: llvm-project
          ref: ${{ env.BASE_BRANCH_NAME }}

      - name: Log PR branch info
        if: github.event_name == 'pull_request'
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "::notice::Building pull request branch '${PR_HEAD_REF}' from repository '${PR_HEAD_REPO}'"
          echo "::notice::Using base branch '${PR_BASE_REF}' for llvm-project checkout"

      - name: Checkout eld
        uses: actions/checkout@v7
        with:
          path: llvm-project/llvm/tools/eld
          repository: ${{ env.ELD_REPO }}
          ref: ${{ env.ELD_REF }}
          fetch-depth: 0

      - name: Configure workflow environment variables
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/ConfigureBuildWorkflowENV

      - name: Restore ccache
        id: cache-ccache
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/obj/ccache
          key: nightly-ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nightly-ccache-${{ runner.os }}-

      - name: Record pre-build entry
        if: github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "pre-"
          workflow-name: "nightly"
          record-mode: "record"
          status: "fail"
          run-id: ${{github.run_id}}
          arch-name: "all"
          branch-name: "${{env.BUILD_BRANCH}}"

      - name: Run CMake
        run: |
          mkdir -p obj
          cd obj
          cat > distribution-components.cmake <<'EOF'
          set(LLVM_INSTALL_TOOLCHAIN_ONLY ON CACHE BOOL "")
          set(LLVM_TOOLCHAIN_TOOLS
            llvm-ar
            llvm-cov
            llvm-cxxfilt
            llvm-dis
            llvm-dlltool
            llvm-dwp
            llvm-lib
            llvm-mca
            llvm-nm
            llvm-objcopy
            llvm-objdump
            llvm-pdbutil
            llvm-profdata
            llvm-profgen
            llvm-ranlib
            llvm-readobj
            llvm-readelf
            llvm-mc
            llvm-as
            llvm-remarkutil
            llvm-size
            llvm-strings
            llvm-strip
            llvm-symbolizer
            opt
            CACHE STRING "")
          set(LLVM_DISTRIBUTION_COMPONENTS
            clang
            lld
            LTO
            clang-resource-headers
            clang-format
            clang-tidy
            clangd
            builtins
            runtimes
            ${LLVM_TOOLCHAIN_TOOLS}
            ld.eld
            CACHE STRING "")
          EOF
          cmake -G Ninja \
            -C distribution-components.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            -DLLVM_ENABLE_PROJECTS="llvm;clang;clang-tools-extra;lld" \
            -DLLVM_ENABLE_RUNTIMES="compiler-rt;libcxx;libcxxabi;libunwind" \
            -DCMAKE_C_COMPILER:STRING=`which clang` \
            -DCMAKE_CXX_COMPILER:STRING=`which clang++` \
            -DCMAKE_CXX_FLAGS:STRING="-stdlib=libc++" \
            -DCMAKE_INSTALL_RPATH:STRING='$ORIGIN/../lib/' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH:BOOL=ON \
            -DLLVM_TARGETS_TO_BUILD:STRING="ARM;AArch64;RISCV;Hexagon;X86" \
            -DLLVM_CCACHE_BUILD:BOOL=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install-nightly-toolchain \
            -DLLVM_CCACHE_DIR:STRING=$PWD/ccache/ \
            -DLLVM_ENABLE_SPHINX=OFF \
            -DELD_ENABLE_SYMBOL_VERSIONING=ON \
            -DLLVM_INSTALL_UTILS=On \
            ../llvm-project/llvm

      - name: Build and install toolchain
        run: |
          cd obj
          ninja -j11 install-distribution

      - name: Install testing utilities into toolchain
        shell: bash
        run: |
          set -euo pipefail
          BUILD_BIN_DIR="${{ github.workspace }}/obj/bin"
          INSTALL_BIN_DIR="${{ github.workspace }}/install-nightly-toolchain/bin"
          mkdir -p "${INSTALL_BIN_DIR}"

          testing_utils=(
            FileCheck
            split-file
            count
            yaml2obj
            obj2yaml
            not
          )

          echo "Building testing utilities with ninja"
          ninja -C "${{ github.workspace }}/obj" -j11 "${testing_utils[@]}"

          echo "Installing testing utilities into ${INSTALL_BIN_DIR}"
          for util in "${testing_utils[@]}"; do
            if [[ -x "${BUILD_BIN_DIR}/${util}" ]]; then
              echo "  - ${util}"
              cp "${BUILD_BIN_DIR}/${util}" "${INSTALL_BIN_DIR}/"
            else
              echo "Warning: testing utility ${util} not found in ${BUILD_BIN_DIR}" >&2
            fi
          done

      - name: Bundle binary shared library dependencies
        shell: bash
        run: |
          bash "${SCRIPTS_DIR}/BundleSharedLibDeps.sh" \
            "${{ github.workspace }}/install-nightly-toolchain" \
            clang clang++ ld.eld lld ld.lld clangd clang-tidy clang-format

          for tool in ld.eld clang; do
            BIN="${{ github.workspace }}/install-nightly-toolchain/bin/${tool}"
            if [[ -x "${BIN}" ]]; then
              echo "${tool} RPATH/RUNPATH:"
              readelf -d "${BIN}" | grep -E 'RPATH|RUNPATH' || true
            fi
          done

      - name: Prune ccache before save
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/obj/ccache
        run: ccache --evict-older-than 7200s

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/obj/ccache
          key: nightly-ccache-${{ runner.os }}-${{ github.run_id }}

      - name: Install ELD-only binaries
        run: |
          cd obj
          DESTDIR="" cmake --install . --component ld.eld \
            --prefix ${{ github.workspace }}/eld-unstable

      - name: Bundle ld.eld shared library dependencies
        shell: bash
        run: |
          bash "${SCRIPTS_DIR}/BundleSharedLibDeps.sh" \
            "${{ github.workspace }}/eld-unstable" \
            ld.eld
      - name: Pack toolchain tarball
        run: |
          tar -C ${{ github.workspace }}/ \
              -Jcvf install-nightly-toolchain.tar.xz install-nightly-toolchain

      - name: Pack ELD-only tarball
        run: |
          tar -C ${{ github.workspace }}/ \
              -Jcvf eld-unstable.tar.xz eld-unstable

      - name: Upload toolchain tarball
        uses: actions/upload-artifact@v7
        with:
          name: install-nightly-toolchain.tar.xz
          path: install-nightly-toolchain.tar.xz
          retention-days: 2

      - name: Check if biannual release day (Jan 1 or Jul 1)
        id: release_day
        run: |
          mmdd=$(date +%m%d)
          if [[ "${mmdd}" == "0101" || "${mmdd}" == "0701" ]]; then
            echo "is_release_day=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_day=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload ELD release to GitHub
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.release_day.outputs.is_release_day == 'true')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: nightly
          name: Nightly ELD Release
          prerelease: true
          files: eld-unstable.tar.xz

      - name: Run tests
        run: |
          cd obj
          ninja -j8 check-eld

      - name: Summarize test results
        run: |
          cd obj
          ninja check-eld-summary

      - name: Update build entry
        if: github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "post-"
          workflow-name: "nightly"
          record-mode: "update"
          status: "pass"
          run-id: ${{github.run_id}}
          arch-name: "all"
          branch-name: "${{env.BUILD_BRANCH}}"
