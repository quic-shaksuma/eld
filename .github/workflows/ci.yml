name: CI

on:
  pull_request:
    paths-ignore:
      - '.github/workflows/sanitize.yml'
      - '.github/workflows/reviter.yml'
      - '.github/workflows/qualcomm-organization-repolinter.yml'
      - '.github/workflows/docs.yaml'
      - '.github/workflows/docs-multiversion.yaml'
      - '.github/workflows/ci-win.yml'
      - '.github/workflows/clang-cross-download.yml'
      - '.github/workflows/clang-cross-schedule.yml'
      - '.github/workflows/nightly-musl-builder.yml'
      - '.github/workflows/picolibc-builder.yml'
      - '.github/workflows/nightly-test.yml'
      - '.github/workflows/update-build-dashboard-data.yml'
      - '.github/workflows/scripts/record_builds.py'
      - '.github/workflows/BuildStatusDataRecorder/action.yaml'
      - '.github/workflows/clang-format-pr.yml'
      - '.github/workflows/cpp-linter-pr.yml'
      - 'etc/**/*.sh'
      - '**/configure_external_llvm.sh'

permissions:
  contents: write
jobs:
  build:
    runs-on: self-hosted
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      statuses: write

    env:
      PR_NUMBER: ${{ github.event.number }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      BASE_BRANCH_NAME: ${{ github.event.pull_request.base.ref }}
      CCACHE_DIR: /local/mnt/workspace/ccache/${{ github.event.pull_request.base.ref }}
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_NOHASHDIR: true

    steps:
      - name: Checkout llvm-project
        uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          ref: ${{ env.BASE_BRANCH_NAME }}
          path: pr-${{ env.PR_NUMBER }}/llvm-project

      - name: Checkout qualcomm/eld PR branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr-${{ env.PR_NUMBER }}/llvm-project/llvm/tools/eld
          fetch-depth: 0

      - name: Setup musl environment
        run: echo "/opt/musl/bin" >> $GITHUB_PATH

      - name: Check for non-doc changes
        id: file-check
        working-directory: pr-${{ env.PR_NUMBER }}/llvm-project/llvm/tools/eld
        run: |
          git fetch origin ${{ env.BASE_BRANCH_NAME }}
          MERGE_BASE=$(git merge-base origin/${{ env.BASE_BRANCH_NAME }} HEAD)
          CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" HEAD)
          echo "Changed files: $CHANGED_FILES"
          for file in $CHANGED_FILES; do
            if [[ ! "$file" =~ ^docs/ && ! "$file" =~ \.md$ ]]; then
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Only docs changed. Skipping build."
          echo "skip_build=true" >> "$GITHUB_OUTPUT"

      - name: Run CMake
        if: steps.file-check.outputs.skip_build == 'false'
        working-directory: pr-${{ env.PR_NUMBER }}
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats
          ccache --set-config "max_size=0"
          ccache --show-config

          rm -rf obj
          mkdir -p obj
          cd obj
          cmake -G Ninja \
            ../llvm-project/llvm \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            -DLLVM_ENABLE_PROJECTS="llvm;clang;clang-tools-extra" \
            -DLLVM_ENABLE_ASSERTIONS:BOOL=ON \
            -DCMAKE_INSTALL_RPATH:STRING="$ORIGIN/../lib" \
            -DCMAKE_C_COMPILER="$(which clang)" \
            -DCMAKE_CXX_COMPILER="$(which clang++)" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;RISCV;Hexagon;X86" \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DLLVM_CCACHE_BUILD:BOOL=ON \
            -DLLVM_CCACHE_DIR:STRING="$CCACHE_DIR" \
            -DELD_ENABLE_SYMBOL_VERSIONING=ON \
            -DLLVM_ENABLE_WERROR:BOOL=ON \
            -DELD_ENABLE_RUN_TESTS:BOOL=On

      - name: Cache Usage before build
        if: steps.file-check.outputs.skip_build == 'false'
        working-directory: pr-${{ env.PR_NUMBER }}/obj
        run: ccache --show-stats --dir=$CCACHE_DIR

      - name: Build
        if: steps.file-check.outputs.skip_build == 'false'
        working-directory: pr-${{ env.PR_NUMBER }}/obj
        run: ninja

      - name: Cache usage after build
        if: steps.file-check.outputs.skip_build == 'false'
        working-directory: pr-${{ env.PR_NUMBER }}/obj
        run: ccache --show-stats --dir=$CCACHE_DIR

      - name: Prune ccache after build
        if: steps.file-check.outputs.skip_build == 'false'
        working-directory: pr-${{ env.PR_NUMBER }}/obj
        run: ccache --evict-older-than 7200s --dir=$CCACHE_DIR

      - name: Run tests
        if: steps.file-check.outputs.skip_build == 'false'
        working-directory: pr-${{ env.PR_NUMBER }}/obj
        run: |
          export PATH="$PATH:/opt/qemu/bin"
          export PATH="$PATH:/local/mnt/workspace/arm-unknown-linux-gnueabi/bin"
          export PATH="$PATH:/local/mnt/workspace/aarch64-unknown-linux-gnu/bin"
          export PATH="$PATH:/local/mnt/workspace/riscv32-unknown-linux-gnu/bin"
          export PATH="$PATH:/local/mnt/workspace/riscv64-unknown-linux-gnu/bin"
          export PATH="$PATH:/local/mnt/workspace/x86_64-unknown-linux-gnu/bin"

          export ELD_ARM_C_COMPILER=arm-unknown-linux-gnueabi-cc
          export ELD_ARM_CXX_COMPILER=arm-unknown-linux-gnueabi-c++
          export ELD_ARM_SYSROOT=/local/mnt/workspace/arm-unknown-linux-gnueabi/arm-unknown-linux-gnueabi/sysroot
          export ELD_AARCH64_C_COMPILER=aarch64-unknown-linux-gnu-cc
          export ELD_AARCH64_CXX_COMPILER=aarch64-unknown-linux-gnu-c++
          export ELD_AARCH64_SYSROOT=/local/mnt/workspace/aarch64-unknown-linux-gnu/aarch64-unknown-linux-gnu/sysroot
          export ELD_RISCV32_C_COMPILER=riscv32-unknown-linux-gnu-cc
          export ELD_RISCV32_CXX_COMPILER=riscv32-unknown-linux-gnu-c++
          export ELD_RISCV32_SYSROOT=/local/mnt/workspace/riscv32-unknown-linux-gnu/riscv32-unknown-linux-gnu/sysroot
          export ELD_RISCV64_C_COMPILER=riscv64-unknown-linux-gnu-cc
          export ELD_RISCV64_CXX_COMPILER=riscv64-unknown-linux-gnu-c++
          export ELD_RISCV64_SYSROOT=/local/mnt/workspace/riscv64-unknown-linux-gnu/riscv64-unknown-linux-gnu/sysroot
          export ELD_X86_64_C_COMPILER=x86_64-unknown-linux-gnu-cc
          export ELD_X86_64_CXX_COMPILER=x86_64-unknown-linux-gnu-c++
          export ELD_X86_64_SYSROOT=/local/mnt/workspace/x86_64-unknown-linux-gnu/x86_64-unknown-linux-gnu/sysroot

          ninja check-eld


      - name: Clean up
        if: always()
        run: |
          rm -rf "pr-${{ env.PR_NUMBER }}"
