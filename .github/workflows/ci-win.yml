name: Windows Arm64/x86_64 Nightly

on:
  pull_request: {} # Uncomment only to test this WF file update.
  schedule:
    # 9:00 PM Central
    - cron: '0 2 * * *'
  workflow_dispatch: {}


permissions:
  contents: write
jobs:
  build-windows:
    if: github.repository == 'qualcomm/eld'
    permissions:
      contents: read
    env:
      BASE_BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
      CCACHE_DIR: ${{ github.workspace }}\ccache\${{ matrix.arch }}
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_CPP2: yes
      CCACHE_SLOPPINESS: pch_defines,time_macros
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            msvc_arch: x64
            name: Windows-x86_64

          - runner: windows-11-arm
            arch: ARM64
            msvc_arch: arm64
            name: Windows-Arm64

    steps:
      - name: Map Git usr/bin to a space-free drive and prepend to PATH
        shell: pwsh
        run: |
          subst P: "C:\Program Files\Git\usr\bin"
          'P:\' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout llvm-project
        uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          ref: ${{ env.BASE_BRANCH_NAME }}
          path: nightly/llvm-project

      - name: Checkout ELD main branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.BASE_BRANCH_NAME }}
          path: nightly/llvm-project/llvm/tools/eld
          fetch-depth: 0

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install ccache
        shell: pwsh
        run: |
          choco install ccache ninja -y --no-progress
          "$env:ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Restore ccache
        id: cache-ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ci-win-ccache-${{ matrix.arch }}-${{ env.BASE_BRANCH_NAME }}-${{ github.run_id }}
          restore-keys: |
            ci-win-ccache-${{ matrix.arch }}-${{ env.BASE_BRANCH_NAME }}-
            ci-win-ccache-${{ matrix.arch }}-

      - name: Initialize ccache
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:CCACHE_DIR | Out-Null
          ccache --zero-stats
          ccache --set-config max_size=0
          ccache --show-config

      - name: Configure CMake
        working-directory: nightly
        shell: bash
        run: |
          mkdir -p obj
          cd obj
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=cl \
            -DCMAKE_CXX_COMPILER=cl \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            -DLLVM_ENABLE_PROJECTS="llvm;clang;clang-tools-extra" \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;RISCV;Hexagon;X86" \
            ../llvm-project/llvm

      - name: Ccache stats before build
        shell: pwsh
        run: ccache --show-stats

      - name: Build
        working-directory: nightly/obj
        shell: bash
        run: cmake --build .

      - name: Ccache stats after build
        if: always()
        shell: pwsh
        run: ccache --show-stats

      - name: Install PyYAML
        shell: bash
        run: python -m pip install pyyaml

      - name: Run tests
        working-directory: nightly/obj
        shell: bash
        run: cmake --build . --target check-eld

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ci-win-ccache-${{ matrix.arch }}-${{ env.BASE_BRANCH_NAME }}-${{ github.run_id }}

      - name: Clean up
        if: always()
        shell: bash
        run: rm -rf nightly
