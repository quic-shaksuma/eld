name: Windows Arm64/x86_64 CI/Nightly

on:
  pull_request: {} # Uncomment to run in CI mode to build ELD PR branch.
  schedule:
    # 9:00 PM Central
    - cron: '0 2 * * *'
  workflow_dispatch: {}


permissions:
  contents: write
jobs:
  build-windows:
    if: github.repository == 'qualcomm/eld'
    permissions:
      contents: write
    env:
      BASE_BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
      ELD_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      ELD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            name: Windows-x86_64

          - runner: windows-11-arm
            arch: ARM64
            name: Windows-Arm64

    steps:
      - name: Install QEMU with winget
        shell: pwsh
        run: |
          $qemuInstallDirs = @(
            'C:\Program Files\qemu',
            'C:\Program Files\QEMU',
            'C:\Program Files (x86)\qemu'
          )

          foreach ($qemuDir in $qemuInstallDirs) {
            if ((Test-Path $qemuDir) -and -not (($env:Path -split ';') -contains $qemuDir)) {
              $env:Path = "$qemuDir;$env:Path"
            }
          }

          if (-not (Get-Command qemu-system-x86_64 -ErrorAction SilentlyContinue)) {
            winget install -e --id SoftwareFreedomConservancy.QEMU --silent --accept-package-agreements --accept-source-agreements
            $machinePath = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
            $userPath = [System.Environment]::GetEnvironmentVariable("Path", "User")
            $env:Path = "$machinePath;$userPath"

            foreach ($qemuDir in $qemuInstallDirs) {
              if ((Test-Path $qemuDir) -and -not (($env:Path -split ';') -contains $qemuDir)) {
                $env:Path = "$qemuDir;$env:Path"
              }
            }
          }

          $qemu = Get-Command qemu-system-x86_64 -ErrorAction SilentlyContinue
          if (-not $qemu) {
            $qemu = Get-Command qemu-system-x86_64.exe -ErrorAction SilentlyContinue
          }

          if (-not $qemu) {
            foreach ($qemuDir in $qemuInstallDirs) {
              $qemuExePath = Join-Path $qemuDir 'qemu-system-x86_64.exe'
              if (Test-Path $qemuExePath) {
                $qemu = Get-Item $qemuExePath
                break
              }
            }
          }

          if (-not $qemu) {
            throw 'qemu-system-x86_64.exe not found. Ensure one of these is on PATH: C:\Program Files\qemu, C:\Program Files\QEMU, or C:\Program Files (x86)\qemu.'
          }

          Split-Path $qemu.Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify QEMU installation
        shell: pwsh
        run: qemu-system-x86_64 --help

      - name: Map Git usr/bin to a space-free drive and prepend to PATH
        shell: pwsh
        run: |
          subst P: "C:\Program Files\Git\usr\bin"
          'P:\' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout llvm-project
        uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          ref: ${{ env.BASE_BRANCH_NAME }}
          path: nightly/llvm-project

      - name: Checkout ELD
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ELD_REPO }}
          ref: ${{ env.ELD_REF }}
          path: nightly/llvm-project/llvm/tools/eld
          fetch-depth: 0

      - name: Record pre-build entry
        if: github.event_name == 'schedule'
        uses: ./nightly/llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "nightly/llvm-project/llvm/tools/eld"
          stage: "pre-"
          workflow-name: "windows_nightly"
          record-mode: "record"
          status: "fail"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.arch }}
          branch-name: "${{ env.BASE_BRANCH_NAME }}"

      - name: Configure CMake
        working-directory: nightly
        shell: bash
        run: |
          mkdir -p obj
          cd obj
          cmake -G "Visual Studio 17 2022" -A ${{ matrix.arch }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            -DLLVM_ENABLE_PROJECTS="llvm;clang;clang-tools-extra" \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;RISCV;Hexagon;X86" \
            ../llvm-project/llvm

      - name: Build
        working-directory: nightly/obj
        shell: bash
        run: cmake --build . --config Release

      - name: Install PyYAML
        shell: bash
        run: python -m pip install pyyaml

      - name: Run tests
        working-directory: nightly/obj
        shell: bash
        run: cmake --build . --config Release --target check-eld

      - name: Update build entry
        if: github.event_name == 'schedule'
        uses: ./nightly/llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "nightly/llvm-project/llvm/tools/eld"
          stage: "post-"
          workflow-name: "windows_nightly"
          record-mode: "update"
          status: "pass"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.arch }}
          branch-name: "${{ env.BASE_BRANCH_NAME }}"

      - name: Clean up
        if: always()
        shell: bash
        run: rm -rf nightly
