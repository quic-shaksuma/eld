# -*- Python -*-
# lit configuration for ELD Vim syntax-highlighting tests.
#
# These tests verify that eld.vim assigns the correct syntax-highlight groups
# to tokens in ELD map files and linker scripts.  They require:
#   - vim in PATH  (nvim is NOT used; vim's synID() is used directly)
#   - Python 3 in PATH
#
# Each test spawns one vim process (~2 s each).  Run with -j1 to avoid
# resource contention when many tests run in parallel:
#
#   lit -j1 /path/to/eld/etc/vim/test
#
# Or from the test directory:
#
#   lit -j1 .

import shutil
from pathlib import Path
import lit.formats

config.name = "eld-vim-syntax"
config.test_format = lit.formats.ShTest(execute_external=True)
config.suffixes = [".test"]
config.test_source_root = str(Path(__file__).parent)
# When driven by CMake the site config sets vim_test_exec_root to the build
# directory so that test output (e.g. Output/) is written there instead of
# the source tree.  Fall back to the source root for stand-alone lit runs.
config.test_exec_root = getattr(config, "vim_test_exec_root", config.test_source_root)

# Per-test timeout: 60 s is generous for a single vim invocation (~2 s each).
# Increase if running on a very slow machine.
lit_config.maxIndividualTestTime = 120

# Vim tests spawn one vim process per test; run serially to avoid contention.
lit_config.numWorkers = 1

# ── Tool discovery ────────────────────────────────────────────────────────────

def _find(names):
    for n in names:
        p = shutil.which(n)
        if p:
            return p
    return None

python3 = _find(["python3", "python"])
# Allow override via:  lit -D vim=/path/to/vim
vim     = lit_config.params.get("vim") or _find(["vim"])

if python3 is None:
    lit_config.fatal("python3 not found in PATH")

if vim is None:
    lit_config.fatal("vim not found in PATH; cannot run syntax tests")

config.available_features.add("vim")

# ── Paths ─────────────────────────────────────────────────────────────────────

# Directory that contains eld.vim (one level up from this test directory).
test_source_root = Path(config.test_source_root)
vim_dir    = test_source_root.parent
eld_vim    = str(vim_dir / "eld.vim")
check_py   = str(test_source_root / "check_syntax.py")
inputs_dir = str(test_source_root / "Inputs")

# ── Substitutions ─────────────────────────────────────────────────────────────

config.substitutions.append(("%python",    python3))
config.substitutions.append(("%vim",       vim))
config.substitutions.append(("%eld_vim",   eld_vim))
config.substitutions.append(("%check_syn", "{} {} --vim {}".format(python3, check_py, vim)))
config.substitutions.append(("%inputs",    inputs_dir))
